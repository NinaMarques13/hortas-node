<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hortas — Cadastro de Estoque</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --border: #2a2d3a;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --primary-glow: rgba(34, 197, 94, 0.15);
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.1);
      --success-bg: rgba(34, 197, 94, 0.1);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -20%, var(--primary-glow), transparent);
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field label .required {
      color: var(--error);
      margin-left: 2px;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .field input::placeholder {
      color: #4b5563;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Toast / Resultado */
    .toast {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
      display: none;
      animation: slideIn 0.3s ease;
      word-break: break-word;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast.success {
      background: var(--success-bg);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      display: block;
    }

    .toast.error {
      background: var(--error-bg);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      display: block;
    }

    /* Config section */
    .config-section {
      margin-bottom: 24px;
    }

    .config-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 8px 0;
    }

    .config-header span {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .config-arrow {
      color: var(--text-muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }

    .config-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .config-body.open {
      max-height: 300px;
    }

    .config-body .field {
      margin-top: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.connected {
      background: var(--primary);
    }

    .status-dot.disconnected {
      background: var(--error);
    }

    @media (max-width: 480px) {
      .row {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">
      <h1>🌱 Hortas</h1>
      <p>Painel de teste — Cadastro de Estoque</p>
    </div>

    <div class="card">
      <!-- Config da API -->
      <div class="config-section">
        <div class="config-header" onclick="toggleConfig()">
          <span>⚙️ Configuração da API</span>
          <span class="config-arrow" id="configArrow">▼</span>
        </div>
        <div class="config-body" id="configBody">
          <div class="field">
            <label for="apiUrl">URL da API</label>
            <input type="text" id="apiUrl" placeholder="http://localhost:3000" />
          </div>
          <div class="field">
          <label for="jwtToken">Token JWT (Bearer)</label>
          <div style="display:flex; gap:8px;">
            <input type="text" id="jwtToken" placeholder="Cole seu token JWT aqui..." style="flex:1;" />
            <button type="button" class="btn btn-primary" onclick="gerarToken()" style="width:auto; padding:10px 16px; font-size:0.75rem;">
              Gerar Token
            </button>
          </div>
        </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Formulário -->
      <form id="estoqueForm" onsubmit="enviarEstoque(event)">
        <div class="section-title">Dados do Estoque</div>

        <div class="row">
          <div class="field">
            <label for="hortas_id_hortas">ID da Horta <span class="required">*</span></label>
            <input type="number" id="hortas_id_hortas" placeholder="Ex: 1" required />
          </div>
          <div class="field">
            <label for="produto_id_produto">ID do Produto <span class="required">*</span></label>
            <input type="number" id="produto_id_produto" placeholder="Ex: 5" required />
          </div>
        </div>

        <div class="field">
          <label for="ds_quantiade">Quantidade <span class="required">*</span></label>
          <input type="number" id="ds_quantiade" placeholder="Ex: 100" required />
        </div>

        <div class="divider"></div>
        <div class="section-title">Datas (opcionais)</div>

        <div class="field">
          <label for="dt_validade">Data de Validade</label>
          <input type="date" id="dt_validade" />
        </div>

        <div class="row">
          <div class="field">
            <label for="dt_colheita">Data de Colheita</label>
            <input type="date" id="dt_colheita" />
          </div>
          <div class="field">
            <label for="dt_plantio">Data de Plantio</label>
            <input type="date" id="dt_plantio" />
          </div>
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Cadastrar Estoque</span>
        </button>

        <div class="toast" id="toast"></div>
      </form>

      <div class="divider"></div>

      <!-- Lista de Estoque -->
      <div class="section-title">Itens Cadastrados</div>
      <div id="listaEstoque" style="font-size:0.8125rem; color:var(--text-muted);">
        Nenhum item cadastrado ainda.
      </div>
    </div>
  </div>

  <script>
    function getApiUrl() {
      return (document.getElementById('apiUrl').value.trim() || window.location.origin).replace(/\/+$/, '');
    }

    function getHeaders() {
      const headers = { 'Content-Type': 'application/json' };
      const token = document.getElementById('jwtToken').value.trim();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return headers;
    }

    // Toggle config section
    function toggleConfig() {
      const body = document.getElementById('configBody');
      const arrow = document.getElementById('configArrow');
      body.classList.toggle('open');
      arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
    }

    // Abrir config por padrão
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('configBody').classList.add('open');
      document.getElementById('configArrow').textContent = '▲';
    });

    // Gerar token JWT de teste
    async function gerarToken() {
      const tokenInput = document.getElementById('jwtToken');
      try {
        tokenInput.value = 'Gerando...';
        const res = await fetch(`${getApiUrl()}/api/gerar-token-teste`);
        const data = await res.json();
        if (res.ok && data.token) {
          tokenInput.value = data.token;
          carregarEstoque(); // carrega a lista ao ter o token
        } else {
          tokenInput.value = '';
          alert('Erro ao gerar token: ' + (data.mensagem || 'Desconhecido'));
        }
      } catch (err) {
        tokenInput.value = '';
        alert('Erro de conexão: ' + err.message);
      }
    }

    // Carregar lista de estoque
    async function carregarEstoque() {
      const lista = document.getElementById('listaEstoque');
      try {
        const res = await fetch(`${getApiUrl()}/api/cadastro-estoque`);
        const data = await res.json();

        if (!data.dados || data.dados.length === 0) {
          lista.innerHTML = '<p style="text-align:center; padding:12px 0;">Nenhum item cadastrado ainda.</p>';
          return;
        }

        lista.innerHTML = data.dados.map(item => `
          <div style="background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
            <div>
              <strong style="color:var(--text);">#${item.id}</strong> —
              Horta: ${item.hortas_id_hortas} |
              Produto: ${item.produto_id_produto} |
              Qtd: ${item.ds_quantiade}
              ${item.dt_validade ? `<br><small>Validade: ${item.dt_validade}</small>` : ''}
            </div>
            <button onclick="excluirItem(${item.id})" style="background:var(--error-bg); border:1px solid rgba(239,68,68,0.3); color:#f87171; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:0.75rem; font-family:'Inter',sans-serif;">
              ✕
            </button>
          </div>
        `).join('');
      } catch (err) {
        lista.innerHTML = `<p style="color:#f87171;">Erro ao carregar: ${err.message}</p>`;
      }
    }

    // Excluir item
    async function excluirItem(id) {
      try {
        const res = await fetch(`${getApiUrl()}/api/cadastro-estoque/${id}`, {
          method: 'DELETE',
          headers: getHeaders(),
        });
        const data = await res.json();
        if (res.ok) {
          carregarEstoque();
        } else {
          alert(data.mensagem || 'Erro ao excluir');
        }
      } catch (err) {
        alert('Erro de conexão: ' + err.message);
      }
    }

    // Enviar dados para a API
    async function enviarEstoque(e) {
      e.preventDefault();

      const toast = document.getElementById('toast');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const submitBtn = document.getElementById('submitBtn');

      toast.className = 'toast';
      toast.style.display = 'none';
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Enviando...';
      submitBtn.disabled = true;

      const body = {
        hortas_id_hortas: document.getElementById('hortas_id_hortas').value,
        produto_id_produto: document.getElementById('produto_id_produto').value,
        ds_quantiade: document.getElementById('ds_quantiade').value,
        dt_validade: document.getElementById('dt_validade').value || null,
        dt_colheita: document.getElementById('dt_colheita').value || null,
        dt_plantio: document.getElementById('dt_plantio').value || null,
      };

      try {
        const res = await fetch(`${getApiUrl()}/api/cadastro-estoque`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok) {
          toast.className = 'toast success';
          toast.textContent = `✅ ${data.mensagem}`;
          document.getElementById('estoqueForm').reset();
          carregarEstoque(); // atualiza a lista
        } else {
          toast.className = 'toast error';
          toast.textContent = `❌ ${data.mensagem || 'Erro desconhecido'}`;
        }
      } catch (err) {
        toast.className = 'toast error';
        toast.textContent = `❌ Erro de conexão: ${err.message}`;
      } finally {
        spinner.style.display = 'none';
        btnText.textContent = 'Cadastrar Estoque';
        submitBtn.disabled = false;
      }
    }

    // Carrega a lista ao abrir a página
    carregarEstoque();
  </script>

</body>

</html>
